# Example Compose file for running Nexus.
#
#   1. Copy .env.example to .env and fill in the values (at minimum a TMDb key
#      and an admin password for the first run).
#   2. docker compose up -d
#   3. Open http://localhost:9494/ and log in as admin.
#
# See docs/docker.md for the full environment-variable reference.

services:
  nexus:
    image: ghcr.io/hellboundglory/nexus:latest
    container_name: nexus
    restart: unless-stopped
    ports:
      - "9494:9494"
    # IMPORTANT for imports: Nexus imports the file at the path your DOWNLOAD
    # CLIENT reports. It must (a) see that path, and (b) be able to write into
    # your library folders. In a typical *arr stack the download client and
    # library run as your host user (PUID/PGID), so run Nexus as that same user
    # and give it the SAME media mount at the SAME path as the download client.
    # Uncomment and set to your host user's ids:
    # user: "1000:1000"
    environment:
      # First-run only: seeds the initial admin account. Ignored once the DB
      # already has a user. Leave ADMIN_PASSWORD unset to get a random password
      # printed once in the logs.
      NEXUS_ADMIN_USER: ${NEXUS_ADMIN_USER:-admin}
      NEXUS_ADMIN_PASSWORD: ${NEXUS_ADMIN_PASSWORD:-}
      # Metadata provider (TMDb v3 API key). Without it, Add-media search is
      # disabled. Write-only: never serialized back to clients.
      NEXUS_TMDB_API_KEY: ${NEXUS_TMDB_API_KEY:-}
      # Optional: stable API key (otherwise a random one is generated per start).
      NEXUS_API_KEY: ${NEXUS_API_KEY:-}
      # Optional: reverse-proxy subpath (e.g. /nexus) and log level.
      NEXUS_URL_BASE: ${NEXUS_URL_BASE:-}
      NEXUS_LOG_LEVEL: ${NEXUS_LOG_LEVEL:-info}
    volumes:
      # /data holds the SQLite DB + logs. The image's /data is mode 0777 so this
      # volume stays writable even when you set `user:` above to a custom uid.
      # For a host bind-mount instead of a named volume: `- ./data:/data`.
      - nexus-data:/data
      # Media mount (REQUIRED for downloading + importing). Mount your media root
      # at the SAME path the download client uses, so the completed-download path
      # it reports resolves inside this container. Example matching a linuxserver
      # SABnzbd/qBittorrent that mounts `${MEDIA_DIRECTORY}:/media`:
      #   - ${MEDIA_DIRECTORY}:/media
      # Then in Nexus → Settings → Root Folders add e.g. /media/movies and
      # /media/tvshows (paths under this shared mount).

volumes:
  nexus-data:
